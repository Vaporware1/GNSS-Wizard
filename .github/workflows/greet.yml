name: Greet New Contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Thanks for opening your first issue on GNSS Wizard! We'll take a look soon."
          pr-message: "Thanks for your first pull request on GNSS Wizard! We'll review it shortly."
